<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Делифон · Design System v0.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      --ink-0: #fff;
      --ink-50: #F7F7F6;
      --ink-100: #EFEFED;
      --ink-200: #E3E3DF;
      --ink-500: #6B6B65;
      --ink-900: #0F0F0E;
      --accent: #D6FF3D;
      --accent-ink: #0F1410;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Onest', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: var(--ink-900);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; }

    @keyframes delifon-spin { to { transform: rotate(360deg); } }
    @keyframes delifon-skeleton {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes delifon-scan {
      0% { top: 10%; opacity: 0.2; }
      50% { top: 85%; opacity: 1; }
      100% { top: 10%; opacity: 0.2; }
    }
    @keyframes delifon-slideup {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes delifon-popin {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes delifon-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .doc-nav-links a:hover { background: var(--ink-100); color: var(--ink-900); }

    ::-webkit-scrollbar { height: 10px; width: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-500); }

    html { scroll-behavior: smooth; scroll-padding-top: 80px; }

    @media (max-width: 900px) {
      .doc-nav-links { display: none !important; }
    }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#0F0F0E">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0F0F0E"/>
      <rect x="500" y="220" width="200" height="360" rx="36" fill="#D6FF3D"/>
      <rect x="540" y="260" width="120" height="280" rx="14" fill="#0F0F0E"/>
      <circle cx="600" cy="560" r="8" fill="#0F0F0E"/>
      <text x="600" y="680" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#D6FF3D" text-anchor="middle" letter-spacing="-1">Делифон</text>
      <text x="600" y="720" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#6B6B65" text-anchor="middle" letter-spacing="2">DESIGN SYSTEM · v0.1</text>
    </svg>
  </template>
  <div id="root"></div>

  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="base.jsx"></script>
  <script type="text/babel" src="product.jsx"></script>
  <script type="text/babel" src="compositions.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
